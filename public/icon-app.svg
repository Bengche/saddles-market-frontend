<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#254a75"/>
      <stop offset="100%" stop-color="#1C3557"/>
    </radialGradient>
  </defs>

  <!-- Background — rounded square (iOS/standard app icon shape) -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>

  <!-- Decorative rings, inset to respect rounded corners -->
  <circle cx="256" cy="256" r="204" fill="none" stroke="#C4A862" stroke-width="1" opacity="0.30"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="#C4A862" stroke-width="0.5" opacity="0.18"/>

  <!--
    Crest scaled to ~65% of canvas height (~270 px).
    Design spans y 10–55 (45 units), centred at (32, 32.5).
    Scale = 270/45 = 6.0
    translateX = 256 − 32×6 = 64
    translateY = 256 − 32.5×6 = 61
  -->
  <g transform="translate(64,61) scale(6)">

    <!-- Outer shield outline -->
    <path d="M32 4 L60 16 L60 38 C60 52 32 60 32 60 C32 60 4 52 4 38 L4 16 Z"
          fill="none" stroke="#C4A862" stroke-width="0.7" opacity="0.45"/>

    <!-- Inner shield border -->
    <path d="M32 10 L54 20 L54 37 C54 48 32 55 32 55 C32 55 10 48 10 37 L10 20 Z"
          fill="none" stroke="#C4A862" stroke-width="1.3"/>

    <!-- Saddle — upper arch -->
    <path d="M18 36 C18 29 24 25 32 25 C40 25 46 29 46 36
             L44 36 C42 31 38 28 32 28 C26 28 22 31 20 36 Z"
          fill="#C4A862"/>

    <!-- Saddle — seat and skirts -->
    <path d="M20 36 L20 41 C20 43 21 44 22 44 L26 44
             C26 44 28 41 32 41 C36 41 38 44 38 44
             L42 44 C43 44 44 43 44 41 L44 36 Z"
          fill="#C4A862"/>

    <!-- Stirrup rings -->
    <circle cx="24" cy="36" r="3.5" fill="#1C3557"/>
    <circle cx="40" cy="36" r="3.5" fill="#1C3557"/>
  </g>
</svg>
